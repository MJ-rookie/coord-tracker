<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin 共享大地圖 v2.4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --border: #e2e8f0; --mush: #ec4899; --flower: #f59e0b; --danger: #ef4444; }
        
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        .container { 
            width: 100%; max-width: 1200px; margin: 0 auto; 
            display: flex; flex-direction: column; height: calc(100vh - 20px); gap: 15px; 
            overflow: hidden; 
        }

        @media (min-width: 768px) {
            .container { flex-direction: row; align-items: stretch; }
            .card { width: 350px; flex-shrink: 0; overflow-y: auto; }
            #recordList { flex-grow: 1; height: 100%; }
        }

        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 1.2rem; }
        
        label { font-size: 0.8rem; color: #64748b; display: block; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; }
        
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-danger { background: var(--danger) !important; }
        .btn-auth { background: #4285F4; margin-bottom: 5px; }

        /* 右側清單與圖片顯示設定 */
        #recordList { flex-grow: 1; overflow-y: auto; padding: 0 10px 50px 0; min-height: 0; }
        .item-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        .item-card img { 
            width: 100%; 
            height: 300px; 
            object-fit: contain; /* 顯示全圖 */
            background: #f8fafc; 
            display: block;
            cursor: pointer;
        }

        .item-info { padding: 15px; }
        
        /* 類別標籤樣式 */
        .badge { 
            font-size: 0.75rem; 
            padding: 3px 10px; 
            border-radius: 20px; 
            color: white; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px;
            font-weight: bold;
        }

        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .action-btns button { flex: 1; padding: 8px; font-size: 0.8rem; margin-top: 0; }

        /* 裁切視窗 */
        #cropper-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; flex-direction: column; }
        .cropper-box { width: 90%; max-width: 600px; background: white; padding: 10px; border-radius: 8px; }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 4000; justify-content: center; align-items: center; font-weight: bold; flex-direction: column; }
    </style>
</head>
<body>

<div id="cropper-modal">
    <div class="cropper-box">
        <div style="max-height: 70vh; overflow: hidden;"><img id="cropper-img" src=""></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="confirmCrop()">✅ 確定裁切</button>
            <button style="background: #64748b;" onclick="closeCropper()">取消</button>
        </div>
    </div>
</div>

<div id="loading-overlay">⌛ 處理中，請稍候...</div>

<div class="main-wrapper">
    <div class="container">
        <div class="card">
            <h2 id="form-title">🛰️ 採點紀錄</h2>
            <button id="auth_btn" class="btn-auth" onclick="handleAuthClick()">1. 連結 Google 帳號</button>
            <div id="user_display" style="font-size:0.7rem; color:#64748b; text-align:center;">尚未連線</div>

            <input type="hidden" id="edit-id">

            <label>地點名稱</label>
            <input type="text" id="locName">
            <label>類別</label>
            <select id="category">
                <option value="菇">🍄 菇類</option>
                <option value="花">🌸 花卉</option>
            </select>
            <label>座標 (緯度, 經度)</label>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="lat" placeholder="緯度" step="any">
                <input type="number" id="lng" placeholder="經度" step="any">
            </div>
            <label>照片 (可自由裁切範圍)</label>
            <input type="file" id="fileInput" accept="image/*" onchange="openCropper(this)">
            <div id="preview-container" style="display:none; margin-top:10px;">
                <img id="preview" style="width:100%; border: 2px solid var(--primary); border-radius:8px;">
            </div>
            
            <button id="save-btn" onclick="saveRecord()" disabled>✅ 儲存資料</button>
            <button id="cancel-edit-btn" style="background:#64748b; display:none;" onclick="cancelEdit()">取消修改</button>
        </div>

        <div id="recordList">
            <p style="text-align:center; color:#94a3b8; margin-top:50px;">同步中...</p>
        </div>
    </div>
</div>

<script>
    const CLIENT_ID = '30705957391-knin529rrok93vikmsbv8vfbtbe5lvlg.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyACs1du7WYKyAAv20jkEP6GYHTHSbttDTg';
    const SPREADSHEET_ID = '1vNkmtTtKrxSkH17-o_4Rmvt0eDwKaAq1dZxuRr_z2fA';
    const SHARED_FOLDER_ID = '1NhUdriZ8lRia2sDbomYBkBTe02eOzwKs'; 
    const SHEET_NAME = '工作表1';

    const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest", "https://sheets.googleapis.com/$discovery/rest?version=v4"];
    const SCOPES = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets";

    let tokenClient, currentUserEmail = "", cropper = null, croppedBlob = null, isEditing = false;

    function gapiLoaded() {
        gapi.load('client', async () => {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: DISCOVERY_DOCS });
            initDataSync(); 
        });
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => {
                if (resp.error) return;
                localStorage.setItem('pikmin_token', resp.access_token);
                fetchUserInfo(resp.access_token);
            }
        });
        const savedToken = localStorage.getItem('pikmin_token');
        if (savedToken) fetchUserInfo(savedToken);
    }

    async function fetchUserInfo(token) {
        try {
            const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${token}` }
            }).then(res => res.json());
            if(userInfo.email) {
                currentUserEmail = userInfo.email;
                document.getElementById('user_display').innerText = `已連線：${currentUserEmail}`;
                document.getElementById('auth_btn').innerText = "✅ 自動登入成功";
                document.getElementById('save-btn').disabled = false;
                gapi.client.setToken({ access_token: token });
            }
        } catch(e) { localStorage.removeItem('pikmin_token'); }
    }

    function openCropper(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('cropper-img');
            img.src = e.target.result;
            document.getElementById('cropper-modal').style.display = 'flex';
            if (cropper) cropper.destroy();
            // 自由比例裁切
            cropper = new Cropper(img, { aspectRatio: NaN, viewMode: 1 }); 
        };
        reader.readAsDataURL(file);
    }

    function confirmCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 800 });
        canvas.toBlob((blob) => {
            croppedBlob = blob;
            document.getElementById('preview').src = canvas.toDataURL('image/jpeg');
            document.getElementById('preview-container').style.display = 'block';
            closeCropper();
        }, 'image/jpeg', 0.8);
    }

    function closeCropper() { document.getElementById('cropper-modal').style.display = 'none'; if(cropper) cropper.destroy(); }

    async function deleteRecord(id, driveId) {
        if (!confirm("確定要刪除這筆紀錄嗎？")) return;
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            await gapi.client.drive.files.delete({ fileId: driveId });
            const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range: `${SHEET_NAME}!A:A` });
            const rowIndex = res.result.values.findIndex(row => row[0] == id);
            if (rowIndex !== -1) {
                await gapi.client.sheets.spreadsheets.batchUpdate({
                    spreadsheetId: SPREADSHEET_ID,
                    resource: { requests: [{ deleteDimension: { range: { sheetId: 0, dimension: "ROWS", startIndex: rowIndex, endIndex: rowIndex + 1 } } }] }
                });
            }
            await initDataSync();
            alert("已刪除紀錄");
        } catch(e) { alert("刪除失敗"); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function startEdit(id, name, cat, lat, lng, driveId) {
        isEditing = true;
        document.getElementById('form-title').innerText = "🔧 修改中...";
        document.getElementById('edit-id').value = id;
        document.getElementById('locName').value = name;
        document.getElementById('category').value = cat;
        document.getElementById('lat').value = lat;
        document.getElementById('lng').value = lng;
        document.getElementById('cancel-edit-btn').style.display = 'block';
        document.getElementById('save-btn').innerText = "更新資料";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        isEditing = false;
        document.getElementById('form-title').innerText = "🛰️ 採點紀錄";
        document.getElementById('save-btn').innerText = "儲存資料";
        clearForm();
        document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    async function saveRecord() {
        const name = document.getElementById('locName').value;
        const lat = document.getElementById('lat').value;
        if (!name || !lat) return alert("請填寫必要資訊");

        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            let driveId = "";
            if (croppedBlob) {
                const metadata = { 'name': `Pikmin_${Date.now()}.jpg`, 'parents': [SHARED_FOLDER_ID] };
                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
                formData.append('file', croppedBlob);
                const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
                    method: 'POST', headers: { Authorization: `Bearer ${gapi.client.getToken().access_token}` }, body: formData
                }).then(r => r.json());
                driveId = res.id;
            }

            if (isEditing) {
                const id = document.getElementById('edit-id').value;
                const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range: `${SHEET_NAME}!A:H` });
                const rowIndex = res.result.values.findIndex(row => row[0] == id);
                const oldRow = res.result.values[rowIndex];
                const updated = [id, new Date().toLocaleString(), name, document.getElementById('category').value, lat, document.getElementById('lng').value, currentUserEmail, driveId || oldRow[7]];
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: SPREADSHEET_ID, range: `${SHEET_NAME}!A${rowIndex + 1}`, valueInputOption: 'RAW', resource: { values: [updated] }
                });
                alert("修改完成");
                cancelEdit();
            } else {
                if (!croppedBlob) return alert("請先處理照片");
                const newRow = [Date.now(), new Date().toLocaleString(), name, document.getElementById('category').value, lat, document.getElementById('lng').value, currentUserEmail, driveId];
                await gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: SPREADSHEET_ID, range: `${SHEET_NAME}!A1`, valueInputOption: 'RAW', resource: { values: [newRow] }
                });
                alert("儲存成功");
                clearForm();
            }
            await initDataSync();
        } catch(e) { alert("操作失敗"); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    async function initDataSync() {
        if (!gapi.client.sheets) return;
        try {
            const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range: `${SHEET_NAME}!A2:H` });
            const data = (res.result.values || []).map(row => ({ id: row[0], time: row[1], name: row[2], cat: row[3], lat: row[4], lng: row[5], user: row[6], driveId: row[7] }));
            renderList(data);
        } catch(e) {}
    }

    function renderList(data) {
        const list = document.getElementById('recordList');
        if (data.length === 0) { list.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:50px;">尚無紀錄</p>'; return; }
        list.innerHTML = data.slice().reverse().map(r => `
            <div class="item-card">
                <img src="https://drive.google.com/thumbnail?id=${r.driveId}&sz=w800" onclick="window.open('https://drive.google.com/file/d/${r.driveId}/view')">
                <div class="item-info">
                    <h3>${r.name} 
                        <span class="badge" style="background:${r.cat === '菇' ? '#ec4899' : '#f59e0b'}">
                            ${r.cat === '菇' ? '🍄 菇類' : '🌸 花卉'}
                        </span>
                    </h3>
                    <p style="font-size:0.8rem; color:#64748b; margin:8px 0;">🌐 座標：${r.lat}, ${r.lng}</p>
                    <span class="user-tag" style="font-size:0.7rem; color:var(--primary); font-weight:bold;">👤 ${r.user}</span>
                    <p style="font-size:0.6rem; color:#a1a1aa; margin-top:5px;">📅 ${r.time}</p>
                    <div class="action-btns">
                        <button onclick="startEdit('${r.id}','${r.name}','${r.cat}','${r.lat}','${r.lng}','${r.driveId}')">🔧 修改</button>
                        <button class="btn-danger" onclick="deleteRecord('${r.id}','${r.driveId}')">🗑️ 刪除</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function clearForm() { document.getElementById('locName').value = ''; document.getElementById('lat').value = ''; document.getElementById('lng').value = ''; document.getElementById('fileInput').value = ''; document.getElementById('preview-container').style.display = 'none'; croppedBlob = null; }
    function handleAuthClick() { tokenClient.requestAccessToken({prompt: 'consent'}); }
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
